<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div id="app">

    <!-- ── Toolbar ── -->
    <div class="toolbar">
      <div class="toolbar-brand">
        <div class="brand-mark"><svg width="10" height="10" viewBox="0 0 24 24" fill="#fff" stroke="none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2h2a5 5 0 0 0 10 0h2zM11 19.93V23h2v-3.07a9 9 0 0 0 0 0z" opacity=".7"/></svg></div>
        <span class="brand-name">Meet Transcriber</span>
        <span class="count-badge" id="count-badge" hidden>0</span>
      </div>
      <button class="tool-btn" id="btn-settings" title="Réglages">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <!-- ── Main view ── -->
    <div id="view-main" class="view active">

      <div id="setup-banner" class="notice notice--warn" hidden>
        <p>Clé API OpenAI requise pour transcrire.</p>
        <button class="capsule capsule--ghost" id="btn-setup">Configurer</button>
      </div>

      <div class="controls">

        <!-- Idle -->
        <div id="ctrl-idle">
          <div class="stage-card">
            <div class="mic-orb">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </div>
            <p class="stage-hint" id="hint-text">Prêt à transcrire</p>
          </div>
          <div class="action-tray">
            <button class="capsule capsule--start" id="btn-start">
              <span class="capsule-dot"></span>Démarrer
            </button>
          </div>
        </div>

        <!-- Recording -->
        <div id="ctrl-recording" hidden>
          <div class="stage-card stage-card--live">
            <div class="waveform" id="waveform"></div>
            <div class="rec-row">
              <div class="rec-indicator">
                <div class="rec-dot-pulse"></div>
                <span class="rec-label">Recording</span>
              </div>
              <span class="timer" id="timer">0:00</span>
            </div>
          </div>
          <div id="mic-warning" class="notice notice--warn notice--sm" hidden>
            <p>Micro non disponible — audio onglet uniquement</p>
          </div>
          <div class="action-tray">
            <button class="capsule capsule--stop" id="btn-stop">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect width="10" height="10" rx="1.5"/></svg>
              Stop
            </button>
          </div>
        </div>

        <!-- Transcribing -->
        <div id="ctrl-transcribing" hidden>
          <div class="stage-card">
            <div class="processing">
              <div class="processing-ring"></div>
              <p class="processing-label">Transcription en cours…</p>
            </div>
          </div>
          <div class="action-tray">
            <button class="capsule capsule--ghost" id="btn-cancel">Annuler</button>
          </div>
        </div>

        <!-- Error -->
        <div id="ctrl-error" hidden>
          <div class="notice notice--error">
            <p id="error-text"></p>
            <div class="notice-actions">
              <button class="capsule capsule--ghost" id="btn-retry">Réessayer</button>
              <button class="capsule capsule--ghost" id="btn-dismiss">Fermer</button>
            </div>
          </div>
        </div>
      </div>

      <!-- History -->
      <div id="history-section">
        <div class="list-header">
          <span class="list-label">Historique</span>
        </div>
        <div id="transcript-list" class="transcript-list">
          <p class="empty-state" id="empty-history">Aucun transcript</p>
        </div>
      </div>
    </div>

    <!-- ── Settings view ── -->
    <div id="view-settings" class="view">
      <div class="view-bar">
        <button class="tool-btn" id="btn-back-settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h2 class="view-bar-title">Réglages</h2>
      </div>
      <div class="form-body">
        <div class="field">
          <label for="input-apikey">Clé API OpenAI</label>
          <div class="input-group">
            <input type="password" id="input-apikey" placeholder="sk-..." autocomplete="off" spellcheck="false">
            <button class="tool-btn" id="btn-toggle-key" title="Afficher / masquer">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="select-lang">Langue</label>
          <select id="select-lang">
            <option value="fr">Français</option><option value="en">English</option><option value="es">Español</option><option value="de">Deutsch</option><option value="it">Italiano</option><option value="pt">Português</option><option value="nl">Nederlands</option><option value="ja">日本語</option><option value="zh">中文</option>
          </select>
        </div>
        <div class="field">
          <label for="input-username">Votre nom</label>
          <input type="text" id="input-username" placeholder="Hugo">
          <p class="field-hint">Pour l'étiquetage des locuteurs</p>
        </div>
        <button class="capsule capsule--accent" id="btn-save-settings">Enregistrer</button>
        <div id="settings-status" class="status-msg" hidden></div>
      </div>
    </div>

    <!-- ── Transcript detail ── -->
    <div id="view-transcript" class="view">
      <div class="view-bar">
        <button class="tool-btn" id="btn-back-transcript">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h2 class="view-bar-title" id="transcript-title">Transcript</h2>
      </div>
      <div class="transcript-body" id="transcript-content"></div>
      <div class="export-row">
        <button class="capsule capsule--ghost" id="btn-copy">Copier</button>
        <button class="capsule capsule--ghost" id="btn-download">.md</button>
        <button class="capsule capsule--ghost" id="btn-download-json">.json</button>
      </div>

      <!-- AI Templates -->
      <div class="ai-section" id="ai-section">
        <div class="list-header"><span class="list-label">AI</span></div>
        <div class="ai-pills" id="ai-pills"></div>
        <div class="ai-loading" id="ai-loading" hidden>
          <div class="processing-ring processing-ring--sm"></div>
          <span class="processing-label">Analyse en cours…</span>
        </div>
        <div class="ai-result" id="ai-result" hidden>
          <div class="ai-result-bar">
            <span class="ai-result-title" id="ai-result-title"></span>
            <button class="tool-btn" id="btn-copy-ai" title="Copier">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <div class="ai-result-body" id="ai-result-content"></div>
        </div>
      </div>
    </div>

    <!-- ── Template manager ── -->
    <div id="view-templates" class="view">
      <div class="view-bar">
        <button class="tool-btn" id="btn-back-templates">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h2 class="view-bar-title">Templates AI</h2>
      </div>
      <div class="form-body" id="templates-list"></div>
      <div class="form-body" style="border-top:1px solid var(--b1)">
        <div class="field"><label for="new-tpl-name">Nouveau template</label><input type="text" id="new-tpl-name" placeholder="Nom (ex: Compte-rendu client)"></div>
        <div class="field"><label for="new-tpl-prompt">Prompt</label><textarea id="new-tpl-prompt" rows="3" placeholder="Instructions pour l'IA…"></textarea></div>
        <button class="capsule capsule--accent" id="btn-add-template">Ajouter</button>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
