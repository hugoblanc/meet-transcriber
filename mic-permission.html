<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Meet Transcriber — Autorisation micro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #202124;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 48px 40px;
      max-width: 420px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 14px; color: #5f6368; line-height: 1.6; margin-bottom: 24px; }
    button {
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      transition: background 0.15s;
    }
    button:hover { background: #1557b0; }
    .status { margin-top: 20px; font-size: 14px; font-weight: 500; }
    .status.success { color: #0d904f; }
    .status.error { color: #e53935; }
    .hint { font-size: 12px; color: #9aa0a6; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎙️</div>
    <h1>Autorisation microphone</h1>
    <p>Meet Transcriber a besoin d'accéder à votre microphone pour enregistrer vos réunions. Cliquez ci-dessous pour autoriser l'accès.</p>
    <button id="btn-grant">Autoriser le microphone</button>
    <div class="status" id="status"></div>
    <div class="hint" id="hint"></div>
  </div>
  <script src="mic-permission.js"></script>
</body>
</html>
